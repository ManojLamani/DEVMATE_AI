name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ─── Backend ────────────────────────────────────────────────────────────────
  backend-lint-build:
    name: Backend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  # ─── ML Service ─────────────────────────────────────────────────────────────
  ml-lint-test:
    name: ML Service — Lint & Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt

      - name: Smoke test — train models
        run: python -m app.training.train_all

      - name: Smoke test — FastAPI startup
        run: |
          python -c "
          import asyncio, httpx
          from app.main import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          r = client.get('/health')
          assert r.status_code == 200, r.text
          print('Health check passed:', r.json())
          "

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api
          VITE_GOOGLE_CLIENT_ID: placeholder

  # ─── Docker Build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build All Images
    runs-on: ubuntu-latest
    needs: [backend-lint-build, ml-lint-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: devmate-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ml-service image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          push: false
          tags: devmate-ml:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: devmate-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=http://localhost:5000/api
            VITE_GOOGLE_CLIENT_ID=placeholder
          cache-from: type=gha
          cache-to: type=gha,mode=max
